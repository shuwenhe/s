name: compiler-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set executable bits
        run: |
          chmod +x ./bin/s-native || true
          chmod +x ./scripts/benchmark-compiler.sh
          chmod +x ./scripts/fuzz-check.sh
          chmod +x ./scripts/repro-build-check.sh

      - name: compiler checks
        run: |
          ./bin/s-native check src/cmd/compile/internal/ssa_core.s
          ./bin/s-native check src/cmd/compile/internal/backend_elf64.s
          ./bin/s-native check src/cmd/compile/internal/semantic.s
          ./bin/s-native check src/cmd/compile/internal/tests/test_ssa.s

      - name: runtime py checks
        run: |
          python3 -m py_compile src/runtime/stackmap_protocol.py src/runtime/check_bridge.py

      - name: smoke fuzz
        run: ./scripts/fuzz-check.sh

      - name: reproducible build
        run: ./scripts/repro-build-check.sh
